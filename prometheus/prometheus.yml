global:
  scrape_interval:     15s
  evaluation_interval: 15s

# Load alerting rules
rule_files:
  - /etc/prometheus/rules/*.yml

# Alertmanager (optional wiring – kept simple for this lab)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  # Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Our demo application
  - job_name: demo-app
    scrape_interval: 10s
    static_configs:
      - targets: ["demo-app:5000"]
    metrics_path: /metrics

  # Node exporter (host-level metrics)
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
